# This yml is used by these pipelines:
# - dotnet-unified-build (public)
#   https://dev.azure.com/dnceng-public/public/_build?definitionId=278
# - dotnet-unified-build-full (public)
#   https://dev.azure.com/dnceng-public/public/_build?definitionId=303
#   Comment trigger only
#   YML schedule trigger disabled by override in AzDO UI
# - unified-build-pr (internal)
#   https://dev.azure.com/dnceng/internal/_build?definitionId=1531
#   YML schedule trigger disabled by override in AzDO UI
# - unified-build-pr-full (internal)
#   https://dev.azure.com/dnceng/internal/_build?definitionId=1532
#   YML schedule trigger disabled by override in AzDO UI

# Only run daily on schedule to save resources
trigger: none

pr:
  branches:
    include:
    - main
    - release/*
  paths:
    include:
      - '*'
    exclude:
      - 'docs/*'
      - '*.md'

schedules:
  - cron: "0 5 * * *" # run at 05:00 (UTC)
    branches:
      include:
      - main
    always: false # run only if there were changes since the last successful scheduled run.

parameters:
- name: buildScope
  displayName: 'Build Scope'
  type: string
  default: 'auto'
  values:
    - auto
    - lite
    - full

variables:
- name: isScheduleTrigger
  value: ${{ eq(variables['Build.Reason'], 'Schedule') }}

- name: isPRTrigger
  value: ${{ eq(variables['Build.Reason'], 'PullRequest') }}

- ${{ if eq(variables['System.TeamProject'], 'public') }}:
  - name: skipComponentGovernanceDetection  # we run CG on internal builds only
    value: true

  - name: Codeql.Enabled  # we run CodeQL on internal builds only
    value: false

- template: /eng/common/templates/variables/pool-providers.yml@self
- template: /eng/pipelines/templates/variables/vmr-build.yml@self

stages:
- template: /eng/pipelines/templates/stages/vmr-build.yml
  parameters:
    ${{ if eq(parameters.buildScope, 'auto') }}:
      ${{ if or(eq(variables.isScheduleTrigger, 'true'), contains(variables['Build.DefinitionName'], '-full')) }}:
        scope: full
      ${{ elseif eq(variables.isPRTrigger, 'true') }}:
        scope: lite
      ${{ else }}:
        scope: full
    ${{ else }}:
      scope: full
    # Exclude runtime dependent jobs for any branch not producing a 1xx version since runtime-related repos aren't built in that context
    # This is enabled for all branches except main and 1xx
    excludeRuntimeDependentJobs: false

- stage: ValidateUserChanges
  displayName: Validate user changes in VMR
  dependsOn: []
  condition: and(
              eq(variables['isPRTrigger'], 'true'),
              and(
                  not(startsWith(variables['System.PullRequest.SourceBranch'], 'refs/heads/darc-')),
                  not(startsWith(variables['System.PullRequest.SourceBranch'], 'darc-')),
                  not(startsWith(variables['System.PullRequest.SourceBranch'], 'release-pr-'))
              )
          )
  jobs:
    - job: Validate
      displayName: Run Validation Script
      pool:
        name: $(shortStackPoolName)
        demands: ImageOverride -equals $(poolImage_Linux)
      steps:
        - checkout: self
          fetchDepth: 0
          persistCredentials: ${{ ne(variables['System.TeamProject'], 'public') }}
          retryCountOnTaskFailure: 5

        - script: |
            set -ex
            echo "Fetching target branch: $(System.PullRequest.TargetBranch)"
            git fetch origin $(System.PullRequest.TargetBranch)
          displayName: Fetch target branch

        - script: |
            set -ex
            eng/common/dotnet.sh run --project eng/tools/ChangeValidation/ChangeValidation.csproj
          displayName: Run ChangeValidation tool
          env:
            SYSTEM_PULLREQUEST_TARGETBRANCH: $(System.PullRequest.TargetBranch)
            SYSTEM_PULLREQUEST_SOURCEBRANCH: $(System.PullRequest.SourceBranch)

# Trigger AI-powered build failure analysis for insertion PRs.
# Dispatches the GitHub Actions agentic workflow when the build fails
# on a darc-*/release-pr-* branch in the public project.
- stage: TriggerBuildFailureAnalysis
  displayName: Trigger build failure analysis
  dependsOn:
    - VMR_Vertical_Build
    - VMR_SourceOnly_Build
  condition: and(
              eq(variables['System.TeamProject'], 'public'),
              eq(variables['isPRTrigger'], 'true'),
              or(
                startsWith(variables['System.PullRequest.SourceBranch'], 'refs/heads/darc-'),
                startsWith(variables['System.PullRequest.SourceBranch'], 'darc-'),
                startsWith(variables['System.PullRequest.SourceBranch'], 'release-pr-')
              ),
              or(
                eq(dependencies.VMR_Vertical_Build.result, 'Failed'),
                eq(dependencies.VMR_SourceOnly_Build.result, 'Failed')
              )
            )
  jobs:
    - job: TriggerAnalysis
      displayName: Dispatch GitHub Actions workflow
      pool:
        name: $(shortStackPoolName)
        demands: ImageOverride -equals $(poolImage_Linux)
      steps:
        - checkout: none
        - script: |
            set -euo pipefail
            echo "Triggering build failure analysis for PR #$(System.PullRequest.PullRequestNumber), build $(Build.BuildId)"
            curl -sf -X POST \
              -H "Authorization: Bearer $(GitHubCommentToken)" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/dotnet/dotnet/actions/workflows/build-failure-analysis.md/dispatches" \
              -d "{\"ref\":\"main\",\"inputs\":{\"pr-number\":\"$(System.PullRequest.PullRequestNumber)\",\"azdo-build-id\":\"$(Build.BuildId)\"}}"
            echo "Dispatched successfully"
          displayName: Dispatch build-failure-analysis workflow
