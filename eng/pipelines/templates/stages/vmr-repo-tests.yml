### This stage runs repo-level tests against packages produced by the VMR build.
### It checks out the target repo, updates its dependencies to use VMR-built packages,
### and runs the repo's test suite.
### NOTE: Requires scope != 'scout' since it depends on VMR_Vertical_Build (not created in scout scope).

parameters:
- name: verifications
  type: object
  default: []

- name: pool_Linux
  type: object
  default:
    name: $(defaultPoolName)
    image: $(poolImage_Linux)
    demands: ImageOverride -equals $(poolImage_Linux)
    os: linux

- name: pool_Windows
  type: object
  default:
    name: $(defaultPoolName)
    image: $(poolImage_Windows)
    demands: ImageOverride -equals $(poolImage_Windows)
    os: windows

stages:

- ${{ if contains(join(';', parameters.verifications), 'repo-test-') }}:
  - stage: VMR_Repo_Tests
    displayName: VMR Repo Tests
    dependsOn:
    - VMR_Vertical_Build
    variables:
    - template: ../variables/vmr-build.yml
    jobs:

    # Runtime libraries test (Linux)
    - ${{ if containsValue(parameters.verifications, 'repo-test-runtime') }}:
      - job: RepoTest_Runtime
        displayName: 'Repo Test: runtime (libs)'
        pool: ${{ parameters.pool_Linux }}
        timeoutInMinutes: 120
        steps:
        - checkout: self

        # Check out runtime repo at current main
        - script: |
            set -e
            git clone --depth 1 https://github.com/dotnet/runtime '$(Pipeline.Workspace)/runtime'
          displayName: Clone dotnet/runtime

        # Set up VMR packages and update runtime dependencies
        - template: /eng/common/templates/steps/vmr-repo-test-setup.yml
          parameters:
            buildId: $(Build.BuildId)
            artifactName: 'AzureLinux_x64_Cross_x64_Artifacts'
            project: '$(System.TeamProject)'
            repoPath: '$(Pipeline.Workspace)/runtime'
            vmrSha: '$(Build.SourceVersion)'
            darcToolPath: '$(Pipeline.Workspace)/runtime/artifacts/tools/darc'

        # Build and test runtime libraries (innerloop)
        - script: |
            set -e
            cd '$(Pipeline.Workspace)/runtime'
            ./build.sh -subset libs -test -c Release
          displayName: Build and test runtime libraries
