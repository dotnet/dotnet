# Compute SOURCE_DATE_EPOCH (Unix seconds since epoch) from Build.BuildNumber
# (format YYYYMMDD.Revision, consistent across all stages/jobs in a run) and
# export it as an environment variable so that NuGet pack stamps the same
# wall-clock time into every .nupkg ZIP envelope.

steps:
- pwsh: |
    $parts = '$(Build.BuildNumber)'.Split('.')
    $epoch = ([DateTimeOffset]::ParseExact($parts[0], 'yyyyMMdd', $null, 'AssumeUniversal')).ToUnixTimeSeconds() + [int]$parts[1]
    Write-Host "Calculated SOURCE_DATE_EPOCH: $epoch from Build.BuildNumber: $(Build.BuildNumber)"
    Write-Host "##vso[task.setvariable variable=SOURCE_DATE_EPOCH]$epoch"
  displayName: Compute SOURCE_DATE_EPOCH
